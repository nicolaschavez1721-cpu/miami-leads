name: Scrape Miami-Dade Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p dashboard
          mkdir -p data

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          PYTHONUNBUFFERED: "1"
          CLERK_EMAIL: ${{ secrets.CLERK_EMAIL }}
          CLERK_PASSWORD: ${{ secrets.CLERK_PASSWORD }}
          CLERK_SESSION: ${{ secrets.CLERK_SESSION }}
          CLERK_NSC: ${{ secrets.CLERK_NSC }}

      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: data/debug_*.png
          if-no-files-found: ignore

      - name: Show result summary
        run: |
          if [ -f data/records.json ]; then
            python3 -c "import json; d=json.load(open('data/records.json')); print('Total:', d['total'])"
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export_*.csv || true
          COUNT=$(python3 -c "import json; d=json.load(open('data/records.json')); print(d['total'])" 2>/dev/null || echo "0")
          git diff --staged --quiet || git commit -m "Auto-scrape $(date +%Y-%m-%d) - ${COUNT} records"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
